# Nixpacks configuration (legacy — production deploys via Railway's Railpack builder,
# which does not read this file; kept as a reference for self-hosting with Nixpacks)

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["corepack enable", "corepack prepare pnpm@10.5.2 --activate", "pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm build", "pnpm db:push"]

[start]
cmd = "pnpm start"

[variables]
COREPACK_INTEGRITY_KEYS = "0"
